<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IPL Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f2f4f7;
font-family:system-ui;
}

/* NAVBAR */

.navbar-brand{
font-weight:700;
font-size:20px;
}

/* MATCH CARD */

.match-card{
margin-top:30px;
border-radius:12px;
}

/* TEAM BLOCK */

.team-box{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.team-logo{
height:50px;
}

.vs-text{
font-weight:bold;
font-size:18px;
color:#888;
}

/* SCORE */

.score-card{
background:#fafafa;
border-radius:8px;
padding:10px;
margin-bottom:6px;
}

/* PLAYER CARD */

.player-card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* MOBILE */

@media(max-width:768px){

.team-logo{
height:40px;
}

.navbar-brand{
font-size:16px;
}

}

</style>

</head>


<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" id="seriesTitle">
Cricket Series
</a>

<select id="matchDropdown" class="form-select w-auto ms-auto">
<option disabled selected>Select Match</option>
</select>

</div>

</nav>



<div class="container">

<div class="card shadow match-card">

<div class="card-body">


<!-- MATCH TITLE -->

<div class="text-center mb-3">

<h4 id="matchName"></h4>

<span class="badge bg-success" id="matchStatus"></span>

</div>



<!-- TEAM VS -->

<div class="row text-center align-items-center mb-4">

<div class="col-5 team-box">

<img id="team1Logo" class="team-logo">

<div>
<div id="team1Name"></div>
<div id="team1Short"></div>
</div>

</div>


<div class="col-2 vs-text">
VS
</div>


<div class="col-5 team-box">

<img id="team2Logo" class="team-logo">

<div>
<div id="team2Name"></div>
<div id="team2Short"></div>
</div>

</div>

</div>



<!-- MATCH INFO -->

<div class="row text-center mb-3">

<div class="col-md-4 col-12 mb-2">

<strong>Venue</strong>
<div id="matchVenue"></div>

</div>

<div class="col-md-4 col-12 mb-2">

<strong>Date</strong>
<div id="matchDate"></div>

</div>

<div class="col-md-4 col-12 mb-2">

<strong>Match Type</strong>
<div id="matchType"></div>

</div>

</div>



<hr>



<!-- SCORE -->

<h5>Score</h5>

<div id="scoreContainer"></div>


</div>

</div>



<!-- TEAMS & PLAYERS -->

<div class="card shadow mt-4">

<div class="card-header bg-dark text-white">
Teams & Players
</div>

<div class="card-body">

<select id="teamDropdown" class="form-select mb-3">
<option disabled selected>Select Team</option>
</select>

<div id="playersContainer" class="row"></div>

</div>

</div>


</div>



<script>

const apiBase = "https://mydemoapi.runasp.net/api/CricketMatch";
const seriesId = "87c62aac-bc3c-4738-ab93-19da0690488f";


loadSeries();
loadMatches();
loadTeams();



/* SERIES */

function loadSeries(){

fetch(apiBase + "/series")

.then(res=>res.json())

.then(data=>{

if(data.length>0){
document.getElementById("seriesTitle").innerText = data[0].name;
}

});

}



/* MATCH LIST */

function loadMatches(){

fetch(apiBase)

.then(res=>res.json())

.then(matches=>{

matches.sort((a,b)=> new Date(a.matchDate) - new Date(b.matchDate));

let dropdown = document.getElementById("matchDropdown");

matches.forEach(match=>{

let option = document.createElement("option");

let date = new Date(match.matchDate).toLocaleDateString();

option.value = match.id;
option.text = date + " - " + match.name;

dropdown.appendChild(option);

});

});

}



document.getElementById("matchDropdown").addEventListener("change",function(){

let id = this.value;

if(!id) return;

loadMatch(id);

});



/* MATCH DETAILS */

function loadMatch(id){

fetch(apiBase + "/live-match/" + id)

.then(res=>res.json())

.then(data=>{

let match = data.data;

document.getElementById("matchName").innerText = match.name;
document.getElementById("matchStatus").innerText = match.status;
document.getElementById("matchVenue").innerText = match.venue;
document.getElementById("matchDate").innerText = match.date;
document.getElementById("matchType").innerText = match.matchType;


/* TEAM 1 */

document.getElementById("team1Name").innerText = match.teamInfo[0].name;
document.getElementById("team1Short").innerText = match.teamInfo[0].shortname;
document.getElementById("team1Logo").src = match.teamInfo[0].img;


/* TEAM 2 */

document.getElementById("team2Name").innerText = match.teamInfo[1].name;
document.getElementById("team2Short").innerText = match.teamInfo[1].shortname;
document.getElementById("team2Logo").src = match.teamInfo[1].img;



/* SCORE */

let html="";

if(match.score){

match.score.forEach(s=>{

html+=`
<div class="score-card">
${s.inning} : <strong>${s.r}/${s.w}</strong> (${s.o} overs)
</div>
`;

});

}

document.getElementById("scoreContainer").innerHTML = html;

});

}



/* TEAMS */

function loadTeams(){

fetch(apiBase + "/series-squad/" + seriesId)

.then(res=>res.json())

.then(data=>{

let dropdown = document.getElementById("teamDropdown");

window.teamData = data.data;

data.data.forEach(team=>{

let option = document.createElement("option");

option.value = team.teamName;
option.text = team.teamName;

dropdown.appendChild(option);

});

});

}



/* PLAYERS */

document.getElementById("teamDropdown").addEventListener("change",function(){

let teamName = this.value;

let team = window.teamData.find(t=>t.teamName === teamName);

let container = document.getElementById("playersContainer");

container.innerHTML="";

team.players.forEach(player=>{

container.innerHTML += `

<div class="col-lg-2 col-md-3 col-6 mb-3">

<div class="player-card">

<h6>${player.name}</h6>
<small>${player.role}</small>

</div>

</div>

`;

});

});

</script>

</body>
</html>
